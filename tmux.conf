# ~/.tmux.conf
# ─────────────────────────────────────────────────────────────────────────────
# tmux config — funciona en VS Code, iTerm, Ghostty, SSH
# Prefix: Ctrl+b (no conflicta con nada)
# ─────────────────────────────────────────────────────────────────────────────
#
# INSTALACIÓN:
#   cp tmux.conf ~/.tmux.conf
#   brew install tmux
#   tmux source ~/.tmux.conf   ← recargar en sesión activa
#
# REQUISITOS OPCIONALES (mejor experiencia):
#   brew install reattach-to-user-namespace   ← copiar al clipboard en Mac
# ─────────────────────────────────────────────────────────────────────────────

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # colores 24-bit (Neovim)
set -g history-limit 50000
set -g mouse on                                    # scroll con mouse
set -g base-index 1                                # tabs desde 1, no 0
set -g pane-base-index 1
set -g renumber-windows on                         # renumera tabs al cerrar
set -g escape-time 0                               # sin delay al presionar Esc (crucial para Neovim)
set -g focus-events on                             # autoread en Neovim
set -g status-interval 5
set -g extended-keys always
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# ── Prefix: Ctrl+b (default, funciona en todos lados) ────────────────────────
set -g prefix C-b
bind C-b send-prefix                               # Ctrl+b Ctrl+b → envía Ctrl+b a la app

# ── Splits / Panes ────────────────────────────────────────────────────────────
# v → split vertical (pane a la derecha)
# s → split horizontal (pane abajo)
# abre en el mismo directorio
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegar entre panes con hjkl (con prefix)
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# vim-tmux-navigator: Ctrl+hjkl navega entre vim splits y tmux panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# Redimensionar panes libremente (con prefix + hjkl mayúscula)
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3

# Redimensionar de 1 en 1 (con prefix + flechas)
bind -r Left  resize-pane -L 1
bind -r Right resize-pane -R 1
bind -r Down  resize-pane -D 1
bind -r Up    resize-pane -U 1

# Zoom: maximizar/restaurar pane actual  (Ctrl+b z)
# ya viene por default, pero lo dejamos explícito
bind z resize-pane -Z

# Cerrar pane sin confirmación
bind x kill-pane

# ── Popup panes: terminal flotante sobre todo ─────────────────────────────────
# Ctrl+b p → popup centrado 80%x80%
# Útil para comandos rápidos sin reorganizar el layout
bind p if-shell -F '#{==:#{session_name},scratch}' \
  'detach-client' \
  'display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "tmux new-session -As scratch"'

# Ctrl+b g → popup con lazygit (si está instalado)
bind g display-popup \
  -E \
  -w "90%" \
  -h "90%" \
  -d "#{pane_current_path}" \
  "lazygit"

# ── Tabs (windows) ────────────────────────────────────────────────────────────
bind t new-window -c "#{pane_current_path}"         # nueva tab
bind , previous-window                              # tab anterior
bind . next-window                                  # tab siguiente
bind r command-prompt "rename-window '%%'"          # renombrar tab

# Ir directo a tab N
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5

# ── Layouts predefinidos ──────────────────────────────────────────────────────
# Space → cicla entre layouts (even-h, even-v, main-v, main-h, tiled)
# ya viene por default

# Layout main-vertical: pane grande a la izquierda, stack a la derecha
bind M select-layout main-vertical \; \
  resize-pane -t 1 -x "65%"                        # pane principal ocupa 65%

# Layout coding: Neovim arriba grande, terminal abajo pequeña
bind C select-layout main-horizontal \; \
  resize-pane -t 1 -y "75%"

# ── Sesiones ──────────────────────────────────────────────────────────────────
bind d detach                                       # detach
bind $ command-prompt "rename-session '%%'"         # renombrar sesión
bind S choose-session                               # switch entre sesiones

# ── Copiar / Pegar ────────────────────────────────────────────────────────────
set -g mode-keys vi                                 # vi keys en modo scroll

bind Enter copy-mode                                # entrar a modo scroll
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"   # Mac clipboard
bind -T copy-mode-vi Escape send -X cancel
# búsqueda en scroll buffer con /
bind -T copy-mode-vi /   command-prompt -p "search:" "send -X search-forward '%%'"

# ── Recargar config ───────────────────────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display "Config recargado"


set -g window-style      'fg=#6272a4,bg=#1a1a1a'   # panes inactivos: texto gris
set -g window-active-style 'fg=#f8f8f2,bg=#000000'  # pane activo: texto normal

# ── Apariencia: statusbar minimalista ─────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#000000,fg=#f8f8f2"

set -g status-left-length 30
set -g status-left "#[fg=#bd93f9,bold] #S #[fg=#44475a]│ "

set -g status-right-length 80
set -g status-right "#(~/.local/bin/tmux-claude-status)#[fg=#44475a]│ #(~/.local/bin/tmux-pr-status '#{pane_current_path}')#[fg=#44475a]│ #[fg=#39d353]#{pane_current_path} #[fg=#44475a]│ #[fg=#39d353]%H:%M"

# Tabs (windows)
set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[fg=#ffb86c,bold,bg=#1a1a1a] #I:#W #[default]"

# Bordes de panes
set -g pane-border-style        "fg=#1a1a1a"
set -g pane-active-border-style "fg=#ff79c6"

# ─────────────────────────────────────────────────────────────────────────────
# REFERENCIA RÁPIDA
# ─────────────────────────────────────────────────────────────────────────────
# PANES
#   Prefix v        split vertical (derecha)
#   Prefix s        split horizontal (abajo)
#   Ctrl+hjkl       navegar panes/vim splits (vim-tmux-navigator)
#   Prefix hjkl     navegar panes (alternativo)
#   Prefix HJKL     redimensionar (5 celdas)
#   Prefix flechas  redimensionar (1 celda)
#   Prefix z        zoom / maximizar pane toggle
#   Prefix x        cerrar pane
#   Prefix p        popup flotante (terminal)
#   Prefix g        popup lazygit
#
# LAYOUTS
#   Prefix Space    ciclar layouts
#   Prefix M        main-vertical (65% izquierda)
#   Prefix C        coding (75% arriba)
#
# TABS
#   Prefix t        nueva tab
#   Prefix , / .    tab anterior / siguiente
#   Prefix 1-5      ir a tab N
#   Prefix r        renombrar tab
#
# SESIONES
#   Prefix d        detach
#   Prefix S        lista de sesiones
#
# SCROLL / BÚSQUEDA
#   Prefix Enter    entrar modo scroll (vi keys)
#   / en scroll     buscar texto
#   y               copiar selección al clipboard
#
# MISC
#   Prefix R        recargar config
# ─────────────────────────────────────────────────────────────────────────────
# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'       # defaults sensatos
set -g @plugin 'tmux-plugins/tmux-resurrect'      # guardar/restaurar sesiones
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-guardar cada 15min
set -g @plugin 'tmux-plugins/tmux-yank'           # copiar al clipboard con mouse
set -g @plugin 'sainnhe/tmux-fzf'                 # Ctrl+b F → buscar panes/sesiones
set -g @plugin 'omerxx/tmux-sessionx'             # Ctrl+b o → UI visual de sesiones

set -g @yank_action 'copy-pipe-no-clear'

# tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-resurrect
set -g @resurrect-capture-pane-contents 'on'

# tmux-sessionx
set -g @sessionx-bind 'o'

# Inicializar TPM (debe ser la última línea)
run '~/.tmux/plugins/tpm/tpm'
